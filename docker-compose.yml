services:
  db:
    image: postgres:16-alpine
    container_name: campa_cima_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: campacima
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: campa_cima_backend
    restart: always
    environment:
      PORT: 3001
      DATABASE_URL: postgres://postgres:postgrespassword@db:5432/campacima
    depends_on:
      - db

  frontend:
    build: .
    container_name: campa_cima_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
